<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Dashboard OTTO</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter,Arial,sans-serif;
  -webkit-tap-highlight-color:transparent;
}

:root{
  --bg1:#eaf4ff;
  --bg2:#f8fafc;
  --bg3:#dbeafe;

  --card:#ffffff;
  --card2:rgba(255,255,255,.86);

  --text:#0f172a;
  --muted:#64748b;
  --soft:#94a3b8;

  --line:rgba(148,163,184,.28);
  --line2:rgba(37,99,235,.18);

  --blue:#2563eb;
  --blue2:#1d4ed8;
  --cyan:#06b6d4;
  --green:#16a34a;
  --green2:#22c55e;
  --red:#dc2626;
  --yellow:#f59e0b;
  --orange:#f97316;
  --purple:#7c3aed;

  --shadow:0 22px 70px rgba(15,23,42,.10);
  --shadow2:0 16px 40px rgba(15,23,42,.07);
  --radius:28px;
}

html{
  width:100%;
  min-height:100%;
  scroll-behavior:smooth;
}

body{
  width:100%;
  min-height:100vh;
  background:
    radial-gradient(circle at 8% 8%,rgba(37,99,235,.18),transparent 28%),
    radial-gradient(circle at 92% 10%,rgba(34,197,94,.14),transparent 27%),
    radial-gradient(circle at 50% 100%,rgba(6,182,212,.13),transparent 34%),
    linear-gradient(135deg,var(--bg1),var(--bg2) 48%,var(--bg3));
  color:var(--text);
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background-image:
    linear-gradient(rgba(37,99,235,.035) 1px, transparent 1px),
    linear-gradient(90deg,rgba(37,99,235,.035) 1px, transparent 1px);
  background-size:42px 42px;
  mask-image:linear-gradient(to bottom,rgba(0,0,0,.78),transparent 82%);
  z-index:-1;
}

.app{
  width:100%;
  min-height:100vh;
  padding:20px;
}

.shell{
  width:100%;
  max-width:1780px;
  margin:0 auto;
}

/* =====================================================
   TOPO
===================================================== */

.topo{
  position:relative;
  overflow:hidden;
  background:linear-gradient(135deg,rgba(255,255,255,.96),rgba(255,255,255,.78));
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.65);
  border-radius:32px;
  padding:24px;
  box-shadow:var(--shadow);
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:18px;
  margin-bottom:18px;
}

.topo::before{
  content:"";
  position:absolute;
  inset:-2px;
  background:
    radial-gradient(circle at 12% 18%,rgba(37,99,235,.18),transparent 28%),
    radial-gradient(circle at 92% 40%,rgba(34,197,94,.12),transparent 30%);
  pointer-events:none;
  z-index:0;
}

.topo > *{
  position:relative;
  z-index:1;
}

.titulo{
  display:flex;
  align-items:center;
  gap:16px;
  min-width:0;
}

.icone{
  width:68px;
  height:68px;
  border-radius:24px;
  background:
    radial-gradient(circle at 30% 25%,rgba(255,255,255,.42),transparent 34%),
    linear-gradient(135deg,#2563eb,#06b6d4 48%,#22c55e);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:33px;
  box-shadow:
    0 18px 48px rgba(37,99,235,.32),
    inset 0 1px 0 rgba(255,255,255,.42);
  flex:none;
}

h1{
  font-size:clamp(28px,3vw,48px);
  font-weight:950;
  letter-spacing:-.075em;
  line-height:.95;
}

.sub{
  margin-top:8px;
  color:var(--muted);
  font-size:14px;
  font-weight:800;
  line-height:1.35;
}

.tempoReal{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:flex-end;
  align-items:center;
}

.pill{
  height:44px;
  padding:0 15px;
  border-radius:999px;
  border:1px solid rgba(148,163,184,.27);
  background:rgba(255,255,255,.88);
  display:flex;
  align-items:center;
  gap:9px;
  color:#1e293b;
  font-size:13px;
  font-weight:950;
  box-shadow:0 9px 24px rgba(15,23,42,.06);
  white-space:nowrap;
}

.pill.refreshMini{
  border-color:rgba(37,99,235,.22);
  color:#1d4ed8;
}

.pulse{
  width:10px;
  height:10px;
  border-radius:999px;
  background:#22c55e;
  box-shadow:0 0 0 0 rgba(34,197,94,.5);
  animation:pulse 1.35s infinite;
}

.pulse.off{
  background:#dc2626;
  animation:none;
  box-shadow:none;
}

@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(34,197,94,.55)}
  70%{box-shadow:0 0 0 9px rgba(34,197,94,0)}
  100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}
}

/* =====================================================
   RESUMO
===================================================== */

.resumo{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:14px;
  margin-bottom:18px;
}

.cardResumo{
  position:relative;
  overflow:hidden;
  background:linear-gradient(145deg,#ffffff,rgba(255,255,255,.84));
  border:1px solid rgba(255,255,255,.76);
  border-radius:28px;
  padding:21px;
  box-shadow:var(--shadow2);
  min-height:138px;
}

.cardResumo::before{
  content:"";
  position:absolute;
  width:160px;
  height:160px;
  right:-70px;
  top:-75px;
  border-radius:999px;
  background:rgba(37,99,235,.10);
}

.cardResumo::after{
  content:"";
  position:absolute;
  inset:auto 18px 15px 18px;
  height:4px;
  border-radius:999px;
  background:rgba(37,99,235,.13);
}

.cardResumo span{
  position:relative;
  z-index:1;
  color:var(--muted);
  font-size:12px;
  font-weight:950;
  letter-spacing:.08em;
  text-transform:uppercase;
  display:flex;
  align-items:center;
  gap:8px;
}

.cardResumo span::before{
  content:"";
  width:9px;
  height:9px;
  border-radius:999px;
  background:var(--blue);
}

.cardResumo strong{
  position:relative;
  z-index:1;
  display:block;
  margin-top:14px;
  font-size:clamp(34px,4vw,56px);
  font-weight:950;
  letter-spacing:-.09em;
  line-height:.9;
}

.cardResumo p{
  position:relative;
  z-index:1;
  margin-top:10px;
  color:var(--muted);
  font-size:12px;
  font-weight:800;
}

.total strong{color:var(--blue)}
.online strong{color:var(--green)}
.instavel strong{color:var(--yellow)}
.offline strong{color:var(--red)}

.total span::before{background:var(--blue)}
.online span::before{background:var(--green)}
.instavel span::before{background:var(--yellow)}
.offline span::before{background:var(--red)}

.total::before{background:rgba(37,99,235,.12)}
.online::before{background:rgba(22,163,74,.12)}
.instavel::before{background:rgba(245,158,11,.16)}
.offline::before{background:rgba(220,38,38,.12)}

.total::after{background:linear-gradient(90deg,var(--blue),var(--cyan))}
.online::after{background:linear-gradient(90deg,var(--green),var(--green2))}
.instavel::after{background:linear-gradient(90deg,var(--yellow),var(--orange))}
.offline::after{background:linear-gradient(90deg,var(--red),#fb7185)}

/* =====================================================
   FILTROS
===================================================== */

.filtrosBox{
  position:sticky;
  top:10px;
  z-index:10;
  margin-bottom:18px;
}

.filtros{
  background:rgba(255,255,255,.88);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.72);
  border-radius:28px;
  padding:14px;
  box-shadow:0 18px 48px rgba(15,23,42,.08);
  display:grid;
  grid-template-columns:1.65fr 1fr 1fr auto;
  gap:12px;
}

.campo{
  position:relative;
  min-width:0;
}

.campoIcone{
  position:absolute;
  left:15px;
  top:50%;
  transform:translateY(-50%);
  color:#64748b;
  font-size:16px;
  pointer-events:none;
}

input,select,button{
  width:100%;
  height:52px;
  border-radius:18px;
  border:1px solid rgba(148,163,184,.32);
  background:#f8fafc;
  padding:0 14px;
  color:#0f172a;
  font-size:14px;
  font-weight:850;
  outline:none;
}

input{
  padding-left:44px;
}

select{
  appearance:none;
  background-image:
    linear-gradient(45deg,transparent 50%,#64748b 50%),
    linear-gradient(135deg,#64748b 50%,transparent 50%);
  background-position:
    calc(100% - 18px) 22px,
    calc(100% - 12px) 22px;
  background-size:6px 6px,6px 6px;
  background-repeat:no-repeat;
  padding-right:34px;
}

input:focus,select:focus{
  border-color:rgba(37,99,235,.9);
  box-shadow:0 0 0 4px rgba(37,99,235,.10);
  background:#fff;
}

button{
  border:none;
  cursor:pointer;
  color:#fff;
  background:
    radial-gradient(circle at 30% 25%,rgba(255,255,255,.35),transparent 32%),
    linear-gradient(135deg,#2563eb,#06b6d4 45%,#22c55e);
  box-shadow:0 14px 34px rgba(37,99,235,.25);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:9px;
  white-space:nowrap;
  transition:.2s ease;
}

button:hover{
  transform:translateY(-1px);
  box-shadow:0 18px 42px rgba(37,99,235,.29);
}

button:active{
  transform:translateY(0);
}

/* =====================================================
   ERRO
===================================================== */

.erro{
  background:linear-gradient(135deg,#fef2f2,#fff7ed);
  color:#991b1b;
  border:1px solid #fecaca;
  border-radius:22px;
  padding:15px 16px;
  margin-bottom:18px;
  font-size:13px;
  font-weight:850;
  display:none;
  white-space:pre-wrap;
  box-shadow:0 12px 28px rgba(220,38,38,.08);
}

.erro.ativo{
  display:block;
}

/* =====================================================
   LISTA
===================================================== */

.lista{
  display:grid;
  gap:13px;
}

.device{
  position:relative;
  overflow:hidden;
  background:linear-gradient(145deg,rgba(255,255,255,.98),rgba(255,255,255,.86));
  border:1px solid rgba(255,255,255,.78);
  border-radius:28px;
  padding:18px;
  box-shadow:0 16px 44px rgba(15,23,42,.075);
  display:grid;
  grid-template-columns:auto 1.45fr 1.05fr 1fr 1.05fr 1.1fr .82fr auto;
  gap:15px;
  align-items:center;
  transition:.2s ease;
}

.device:hover{
  transform:translateY(-2px);
  box-shadow:0 22px 58px rgba(15,23,42,.11);
}

.device::before{
  content:"";
  position:absolute;
  inset:0 auto 0 0;
  width:5px;
  background:#dc2626;
}

.device.status-online::before{
  background:linear-gradient(180deg,var(--green),var(--green2));
}

.device.status-instavel::before{
  background:linear-gradient(180deg,var(--yellow),var(--orange));
}

.device.status-offline::before{
  background:linear-gradient(180deg,var(--red),#fb7185);
}

.dot{
  width:18px;
  height:18px;
  border-radius:999px;
  background:var(--red);
  box-shadow:0 0 0 7px rgba(220,38,38,.10);
  margin-left:2px;
}

.dot.online{
  background:var(--green);
  box-shadow:0 0 0 7px rgba(22,163,74,.12);
}

.dot.instavel{
  background:var(--yellow);
  box-shadow:0 0 0 7px rgba(245,158,11,.14);
}

.nome{
  min-width:0;
}

.nome strong{
  display:block;
  color:#0f172a;
  font-size:18px;
  font-weight:950;
  letter-spacing:-.045em;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.nome span{
  display:block;
  margin-top:6px;
  color:var(--muted);
  font-size:12px;
  font-weight:850;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.info{
  min-width:0;
}

.info small{
  display:flex;
  align-items:center;
  gap:6px;
  color:var(--muted);
  font-size:10.5px;
  font-weight:950;
  text-transform:uppercase;
  letter-spacing:.08em;
  margin-bottom:6px;
}

.info strong{
  display:block;
  color:#1e293b;
  font-size:13px;
  font-weight:900;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.tag{
  min-height:40px;
  padding:0 14px;
  border-radius:999px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-transform:uppercase;
  font-size:12px;
  font-weight:950;
  letter-spacing:.06em;
  white-space:nowrap;
  border:1px solid transparent;
}

.tag.online{
  background:#dcfce7;
  color:#166534;
  border-color:#bbf7d0;
}

.tag.instavel{
  background:#fef3c7;
  color:#92400e;
  border-color:#fde68a;
}

.tag.offline{
  background:#fee2e2;
  color:#991b1b;
  border-color:#fecaca;
}

.vazio{
  background:rgba(255,255,255,.88);
  border:1px dashed rgba(148,163,184,.55);
  border-radius:28px;
  padding:46px 22px;
  color:var(--muted);
  font-size:15px;
  font-weight:850;
  text-align:center;
  box-shadow:0 12px 32px rgba(15,23,42,.05);
}

.vazioIcone{
  width:72px;
  height:72px;
  margin:0 auto 16px;
  border-radius:26px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#dbeafe,#dcfce7);
  color:#1d4ed8;
  font-size:32px;
}

.footerInfo{
  margin-top:18px;
  color:#64748b;
  font-size:12px;
  font-weight:800;
  text-align:center;
}

/* =====================================================
   LOADING
===================================================== */

.loadingLinha{
  height:4px;
  border-radius:999px;
  overflow:hidden;
  background:rgba(148,163,184,.18);
  margin-bottom:18px;
  display:none;
}

.loadingLinha.ativo{
  display:block;
}

.loadingLinha span{
  display:block;
  width:38%;
  height:100%;
  border-radius:999px;
  background:linear-gradient(90deg,#2563eb,#06b6d4,#22c55e);
  animation:loadingMove 1.1s infinite ease-in-out;
}

@keyframes loadingMove{
  0%{transform:translateX(-110%)}
  100%{transform:translateX(290%)}
}

/* =====================================================
   RESPONSIVO COMPUTADOR MENOR
===================================================== */

@media(max-width:1300px){
  .device{
    grid-template-columns:auto 1.3fr 1fr 1fr 1fr auto;
  }

  .device .info.sistemaInfo{
    display:none;
  }

  .device .info.ipInfo{
    display:none;
  }
}

@media(max-width:1100px){
  .app{
    padding:16px;
  }

  .resumo{
    grid-template-columns:repeat(4,minmax(0,1fr));
    gap:12px;
  }

  .cardResumo{
    padding:18px;
    min-height:126px;
  }

  .filtros{
    grid-template-columns:1.25fr 1fr 1fr;
  }

  .filtros button{
    grid-column:1/4;
  }

  .device{
    grid-template-columns:auto 1fr 1fr;
    align-items:start;
  }

  .device .tag{
    grid-column:1/4;
    width:100%;
  }

  .device .info{
    background:#f8fafc;
    border:1px solid rgba(148,163,184,.20);
    border-radius:18px;
    padding:12px;
  }
}

/* =====================================================
   TABLET
===================================================== */

@media(max-width:900px){
  .topo{
    flex-direction:column;
    align-items:stretch;
    border-radius:28px;
  }

  .tempoReal{
    justify-content:flex-start;
  }

  .resumo{
    grid-template-columns:repeat(2,minmax(0,1fr));
  }

  .filtros{
    grid-template-columns:1fr 1fr;
  }

  .filtros .campo:first-child{
    grid-column:1/3;
  }

  .filtros button{
    grid-column:1/3;
  }

  .device{
    grid-template-columns:auto 1fr 1fr;
  }
}

/* =====================================================
   CELULAR
===================================================== */

@media(max-width:640px){
  body{
    background:
      radial-gradient(circle at 0% 0%,rgba(37,99,235,.18),transparent 32%),
      radial-gradient(circle at 100% 0%,rgba(34,197,94,.12),transparent 32%),
      linear-gradient(135deg,#eef6ff,#f8fafc);
  }

  .app{
    padding:10px;
  }

  .topo{
    padding:16px;
    border-radius:24px;
    margin-bottom:12px;
  }

  .titulo{
    gap:12px;
  }

  .icone{
    width:54px;
    height:54px;
    border-radius:20px;
    font-size:26px;
  }

  h1{
    font-size:28px;
    letter-spacing:-.065em;
  }

  .sub{
    font-size:12.5px;
    margin-top:6px;
  }

  .tempoReal{
    display:grid;
    grid-template-columns:1fr;
    gap:8px;
  }

  .pill{
    width:100%;
    height:42px;
    justify-content:center;
    font-size:12.5px;
  }

  .resumo{
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:9px;
    margin-bottom:12px;
  }

  .cardResumo{
    border-radius:21px;
    padding:14px;
    min-height:112px;
  }

  .cardResumo span{
    font-size:10px;
  }

  .cardResumo strong{
    font-size:36px;
    margin-top:12px;
  }

  .cardResumo p{
    font-size:10.5px;
    margin-top:8px;
  }

  .filtrosBox{
    top:6px;
    margin-bottom:12px;
  }

  .filtros{
    border-radius:23px;
    padding:10px;
    grid-template-columns:1fr;
    gap:8px;
  }

  .filtros .campo:first-child{
    grid-column:auto;
  }

  .filtros button{
    grid-column:auto;
  }

  input,select,button{
    height:48px;
    border-radius:16px;
    font-size:13px;
  }

  .lista{
    gap:10px;
  }

  .device{
    border-radius:23px;
    padding:15px;
    grid-template-columns:auto 1fr;
    gap:11px;
  }

  .device:hover{
    transform:none;
  }

  .dot{
    width:16px;
    height:16px;
    margin-top:4px;
  }

  .nome strong{
    font-size:16px;
    white-space:normal;
    line-height:1.15;
  }

  .nome span{
    font-size:11px;
  }

  .device .info{
    grid-column:1/3;
    border-radius:17px;
    padding:11px;
  }

  .device .info small{
    font-size:10px;
  }

  .device .info strong{
    font-size:12.5px;
    white-space:normal;
    line-height:1.35;
  }

  .device .tag{
    grid-column:1/3;
    min-height:42px;
  }

  .vazio{
    border-radius:23px;
    padding:34px 18px;
    font-size:13.5px;
  }

  .vazioIcone{
    width:62px;
    height:62px;
    border-radius:22px;
    font-size:28px;
  }
}

/* =====================================================
   CELULAR MUITO PEQUENO
===================================================== */

@media(max-width:390px){
  .app{
    padding:8px;
  }

  .topo{
    padding:14px;
  }

  .icone{
    width:48px;
    height:48px;
    border-radius:18px;
  }

  h1{
    font-size:24px;
  }

  .sub{
    font-size:12px;
  }

  .cardResumo{
    padding:12px;
    min-height:104px;
  }

  .cardResumo strong{
    font-size:32px;
  }

  input,select,button{
    height:46px;
    font-size:12.5px;
  }
}
</style>
</head>

<body>
<main class="app">
  <div class="shell">

    <header class="topo">
      <div class="titulo">
        <div class="icone">📊</div>
        <div>
          <h1>Dashboard OTTO</h1>
          <p class="sub">Monitoramento dos dispositivos conectados em tempo real</p>
        </div>
      </div>

      <div class="tempoReal">
        <div class="pill">
          <span id="pulse" class="pulse off"></span>
          <span id="statusConexao">Desconectado</span>
        </div>

        <div class="pill refreshMini" id="ultimaAtualizacao">
          Última atualização: -
        </div>
      </div>
    </header>

    <section class="resumo">
      <div class="cardResumo total">
        <span>Total</span>
        <strong id="total">0</strong>
        <p>Dispositivos encontrados</p>
      </div>

      <div class="cardResumo online">
        <span>Online</span>
        <strong id="online">0</strong>
        <p>Funcionando agora</p>
      </div>

      <div class="cardResumo instavel">
        <span>Instável</span>
        <strong id="instavel">0</strong>
        <p>Sinal atrasando</p>
      </div>

      <div class="cardResumo offline">
        <span>Offline</span>
        <strong id="offline">0</strong>
        <p>Sem comunicação</p>
      </div>
    </section>

    <section class="filtrosBox">
      <div class="filtros">
        <div class="campo">
          <span class="campoIcone">🔎</span>
          <input id="busca" placeholder="Buscar nome, empresa, setor, IP..." oninput="filtrarLocal()">
        </div>

        <div class="campo">
          <select id="empresa" onchange="filtrarLocal()">
            <option value="">Todas as empresas</option>
            <option value="MERCATTO RESTAURANTE">MERCATTO RESTAURANTE</option>
            <option value="MERCATTO EMPORIO">MERCATTO EMPORIO</option>
            <option value="DELICIA GOURMET">DELICIA GOURMET</option>
            <option value="PADARIA DELICIA">PADARIA DELICIA</option>
            <option value="VILLA GOURMET">VILLA GOURMET</option>
            <option value="M.KIDS">M.KIDS</option>
          </select>
        </div>

        <div class="campo">
          <select id="status" onchange="filtrarLocal()">
            <option value="">Todos os status</option>
            <option value="online">Online</option>
            <option value="instavel">Instável</option>
            <option value="offline">Offline</option>
          </select>
        </div>

        <button type="button" onclick="pedirLista()">
          <span>Atualizar</span>
          <span>↻</span>
        </button>
      </div>
    </section>

    <div id="loadingLinha" class="loadingLinha">
      <span></span>
    </div>

    <div id="erro" class="erro"></div>

    <section id="lista" class="lista"></section>

    <div class="footerInfo">
      OTTO • Monitoramento inteligente de dispositivos
    </div>

  </div>
</main>

<script>
const CONFIG = {
  SECRET: "otto_audio_2026",

  /*
    Quando abrir a dashboard pelo próprio servidor Render/Railway, funciona automático.
    Exemplo:
    https://otto-audio-ws.onrender.com/dashboard

    Se a dashboard ficar em outro domínio, coloque fixo:
    WS_URL: "wss://otto-audio-ws.onrender.com"
  */
  WS_URL: `${location.protocol === "https:" ? "wss" : "ws"}://${location.host}`
};

let ws = null;
let reconnectTimer = null;
let dispositivosOriginais = [];
let loadingTimer = null;

const $ = (id) => document.getElementById(id);

function escapar(valor){
  return String(valor ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function mostrarErro(texto){
  $("erro").classList.add("ativo");
  $("erro").textContent = texto;
}

function limparErro(){
  $("erro").classList.remove("ativo");
  $("erro").textContent = "";
}

function setLoading(ok){
  const el = $("loadingLinha");

  if(ok){
    el.classList.add("ativo");

    if(loadingTimer){
      clearTimeout(loadingTimer);
    }

    loadingTimer = setTimeout(() => {
      el.classList.remove("ativo");
    }, 4500);

    return;
  }

  el.classList.remove("ativo");

  if(loadingTimer){
    clearTimeout(loadingTimer);
    loadingTimer = null;
  }
}

function setConectado(ok){
  $("pulse").classList.toggle("off", !ok);
  $("statusConexao").textContent = ok ? "Tempo real conectado" : "Desconectado";
}

function enviar(payload){
  if(!ws || ws.readyState !== WebSocket.OPEN){
    return false;
  }

  ws.send(JSON.stringify(payload));
  return true;
}

function conectarWS(){
  if(ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)){
    return;
  }

  setLoading(true);

  ws = new WebSocket(CONFIG.WS_URL);

  ws.onopen = () => {
    setConectado(true);
    limparErro();
    setLoading(false);

    if(reconnectTimer){
      clearTimeout(reconnectTimer);
      reconnectTimer = null;
    }

    enviar({
      type:"dashboard-register",
      secret:CONFIG.SECRET
    });

    setTimeout(() => {
      pedirLista();
    }, 350);
  };

  ws.onmessage = (event) => {
    let msg = {};

    try{
      msg = JSON.parse(event.data);
    }catch(error){
      return;
    }

    if(msg.type === "dashboard-ok"){
      setConectado(true);
      limparErro();
      setLoading(false);
      return;
    }

    if(msg.type === "devices-list"){
      dispositivosOriginais = Array.isArray(msg.devices) ? msg.devices : [];

      $("ultimaAtualizacao").textContent = "Última atualização: " + new Date().toLocaleTimeString("pt-BR", {
        hour:"2-digit",
        minute:"2-digit",
        second:"2-digit"
      });

      setLoading(false);
      limparErro();
      filtrarLocal();
      return;
    }

    if(msg.type === "error"){
      setLoading(false);
      mostrarErro(msg.message || "Erro no servidor.");
    }
  };

  ws.onclose = () => {
    setConectado(false);
    setLoading(false);
    mostrarErro("Conexão caiu. Tentando reconectar automaticamente...");

    if(reconnectTimer){
      clearTimeout(reconnectTimer);
    }

    reconnectTimer = setTimeout(() => {
      conectarWS();
    }, 2500);
  };

  ws.onerror = () => {
    setConectado(false);
    setLoading(false);
    mostrarErro("Erro no WebSocket. Verifique se o servidor está online.");
  };
}

function pedirLista(){
  setLoading(true);

  const enviado = enviar({
    type:"devices-list-request",
    secret:CONFIG.SECRET
  });

  if(!enviado){
    setLoading(false);
    mostrarErro("Não foi possível atualizar. O WebSocket ainda não está conectado.");
  }
}

function tempoSemSinal(segundos){
  const n = Number(segundos || 0);

  if(n <= 3) return "agora";
  if(n < 60) return n + "s atrás";

  const min = Math.floor(n / 60);

  if(min < 60) return min + "min atrás";

  const horas = Math.floor(min / 60);

  if(horas < 24) return horas + "h atrás";

  const dias = Math.floor(horas / 24);

  return dias + "d atrás";
}

function formatarData(dataIso){
  if(!dataIso) return "-";

  try{
    return new Date(dataIso).toLocaleString("pt-BR", {
      day:"2-digit",
      month:"2-digit",
      year:"numeric",
      hour:"2-digit",
      minute:"2-digit"
    });
  }catch(error){
    return "-";
  }
}

function statusTexto(status){
  if(status === "online") return "ONLINE";
  if(status === "instavel") return "INSTÁVEL";
  return "OFFLINE";
}

function ordenarDispositivos(lista){
  const peso = {
    online:1,
    instavel:2,
    offline:3
  };

  return lista.sort((a,b) => {
    const pa = peso[a.status || "offline"] || 9;
    const pb = peso[b.status || "offline"] || 9;

    if(pa !== pb) return pa - pb;

    const sa = Number(a.segundosSemSinal || 0);
    const sb = Number(b.segundosSemSinal || 0);

    return sa - sb;
  });
}

function atualizarResumo(lista){
  $("total").textContent = lista.length;
  $("online").textContent = lista.filter((item) => item.status === "online").length;
  $("instavel").textContent = lista.filter((item) => item.status === "instavel").length;
  $("offline").textContent = lista.filter((item) => item.status === "offline").length;
}

function montarCard(item){
  const status = item.status || "offline";

  return `
    <article class="device status-${escapar(status)}">
      <div class="dot ${escapar(status)}"></div>

      <div class="nome">
        <strong>${escapar(item.nome || "DISPOSITIVO SEM NOME")}</strong>
        <span>${escapar(item.id || "-")}</span>
      </div>

      <div class="info">
        <small>🏢 Empresa / Setor</small>
        <strong>${escapar(item.empresa || "-")} • ${escapar(item.setor || "-")}</strong>
      </div>

      <div class="info">
        <small>📍 Unidade / Tipo</small>
        <strong>${escapar(item.unidade || "-")} • ${escapar(item.tipo || "-")}</strong>
      </div>

      <div class="info sistemaInfo">
        <small>💻 Sistema</small>
        <strong>${escapar(item.sistema || "-")} • ${escapar(item.navegador || "-")}</strong>
      </div>

      <div class="info">
        <small>⏱️ Último sinal</small>
        <strong>${tempoSemSinal(item.segundosSemSinal)} • ${formatarData(item.ultimoSinal)}</strong>
      </div>

      <div class="info ipInfo">
        <small>🌐 IP</small>
        <strong>${escapar(item.ip || "-")}</strong>
      </div>

      <div class="tag ${escapar(status)}">
        ${statusTexto(status)}
      </div>
    </article>
  `;
}

function renderizar(lista){
  atualizarResumo(lista);

  const container = $("lista");

  if(!lista.length){
    container.innerHTML = `
      <div class="vazio">
        <div class="vazioIcone">📡</div>
        Nenhum dispositivo encontrado.
        <br><br>
        Abra o <b>index</b> no aparelho, preencha os dados e clique em <b>Iniciar envio</b>.
      </div>
    `;
    return;
  }

  container.innerHTML = ordenarDispositivos(lista).map(montarCard).join("");
}

function filtrarLocal(){
  const busca = $("busca").value.trim().toLowerCase();
  const empresa = $("empresa").value.trim();
  const status = $("status").value.trim();

  let lista = [...dispositivosOriginais];

  if(empresa){
    lista = lista.filter((item) => item.empresa === empresa);
  }

  if(status){
    lista = lista.filter((item) => item.status === status);
  }

  if(busca){
    lista = lista.filter((item) => {
      const texto = [
        item.id,
        item.nome,
        item.empresa,
        item.unidade,
        item.setor,
        item.tipo,
        item.sistema,
        item.navegador,
        item.ip,
        item.observacao
      ].join(" ").toLowerCase();

      return texto.includes(busca);
    });
  }

  renderizar(lista);
}

window.pedirLista = pedirLista;
window.filtrarLocal = filtrarLocal;

conectarWS();
renderizar([]);
</script>
</body>
</html>
