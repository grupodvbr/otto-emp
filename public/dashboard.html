<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Dashboard OTTO</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Inter,Arial,sans-serif}body{min-height:100vh;background:linear-gradient(135deg,#eef6ff,#f8fafc);color:#0f172a;padding:18px}.app{max-width:1500px;margin:0 auto}.topo,.box{background:white;border:1px solid rgba(148,163,184,.28);border-radius:28px;padding:22px;box-shadow:0 18px 55px rgba(15,23,42,.08);margin-bottom:16px}.topo{display:flex;justify-content:space-between;gap:14px;align-items:center}h1{font-size:clamp(28px,4vw,52px);letter-spacing:-.07em}.sub{color:#64748b;font-weight:800;margin-top:6px}.pill{height:42px;border-radius:999px;background:#f8fafc;border:1px solid rgba(148,163,184,.32);padding:0 14px;display:flex;align-items:center;font-weight:950}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.card{background:white;border:1px solid rgba(148,163,184,.28);border-radius:24px;padding:18px;box-shadow:0 14px 42px rgba(15,23,42,.06)}.card span{font-size:12px;color:#64748b;font-weight:950;text-transform:uppercase}.card strong{display:block;margin-top:10px;font-size:42px;letter-spacing:-.08em}.filtros{display:grid;grid-template-columns:1.5fr 1fr 1fr auto;gap:10px}input,select,button{height:50px;border-radius:16px;border:1px solid rgba(148,163,184,.32);padding:0 14px;font-weight:850;background:#f8fafc}button{background:linear-gradient(135deg,#2563eb,#22c55e);color:white;border:0;cursor:pointer}.lista{display:grid;gap:12px}.device{background:white;border:1px solid rgba(148,163,184,.28);border-radius:24px;padding:16px;display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:12px;align-items:center;box-shadow:0 12px 34px rgba(15,23,42,.06)}.tag{border-radius:999px;padding:10px 12px;font-weight:950;text-align:center}.online{background:#dcfce7;color:#166534}.offline{background:#fee2e2;color:#991b1b}.instavel{background:#fef3c7;color:#92400e}.muted{color:#64748b;font-size:12px;font-weight:800}.vazio{text-align:center;color:#64748b;font-weight:850;padding:28px}@media(max-width:900px){.topo{flex-direction:column;align-items:stretch}.grid{grid-template-columns:repeat(2,1fr)}.filtros{grid-template-columns:1fr 1fr}.filtros input,.filtros button{grid-column:1/3}.device{grid-template-columns:1fr}}@media(max-width:520px){body{padding:10px}.topo,.box,.card{border-radius:22px;padding:16px}.grid{gap:8px}.card strong{font-size:34px}.filtros{grid-template-columns:1fr}.filtros input,.filtros button{grid-column:auto}}
</style>
</head>
<body>
<main class="app">
<header class="topo"><div><h1>Dashboard OTTO</h1><p class="sub">Dispositivos conectados em tempo real</p></div><div class="pill" id="status">Desconectado</div></header>
<section class="grid"><div class="card"><span>Total</span><strong id="total">0</strong></div><div class="card"><span>Online</span><strong id="online">0</strong></div><div class="card"><span>Instável</span><strong id="instavel">0</strong></div><div class="card"><span>Offline</span><strong id="offline">0</strong></div></section>
<section class="box filtros"><input id="busca" placeholder="Buscar dispositivo, empresa, setor..."><select id="empresa"><option value="">Todas empresas</option><option>MERCATTO RESTAURANTE</option><option>MERCATTO EMPORIO</option><option>DELICIA GOURMET</option><option>PADARIA DELICIA</option><option>VILLA GOURMET</option><option>M.KIDS</option></select><select id="statusFiltro"><option value="">Todos status</option><option value="online">Online</option><option value="instavel">Instável</option><option value="offline">Offline</option></select><button onclick="pedirLista()">Atualizar</button></section>
<section class="lista" id="lista"><div class="box vazio">Aguardando dispositivos...</div></section>
</main>
<script>
const CONFIG={SECRET:'otto_audio_2026',WS_URL:`${location.protocol==='https:'?'wss':'ws'}://${location.host}`};let ws=null,devices=[];const $=id=>document.getElementById(id);function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')}function statusTexto(s){return s==='online'?'ONLINE':s==='instavel'?'INSTÁVEL':'OFFLINE'}function resumo(l){$('total').textContent=l.length;$('online').textContent=l.filter(i=>i.status==='online').length;$('instavel').textContent=l.filter(i=>i.status==='instavel').length;$('offline').textContent=l.filter(i=>i.status==='offline').length}function render(){let l=[...devices];const b=$('busca').value.toLowerCase(),e=$('empresa').value,s=$('statusFiltro').value;if(e)l=l.filter(i=>i.empresa===e);if(s)l=l.filter(i=>i.status===s);if(b)l=l.filter(i=>[i.id,i.nome,i.empresa,i.unidade,i.setor,i.tipo,i.sistema,i.navegador,i.ip].join(' ').toLowerCase().includes(b));resumo(l);$('lista').innerHTML=l.length?l.map(i=>`<article class="device"><div><b>${esc(i.nome||'DISPOSITIVO')}</b><div class="muted">${esc(i.id||'-')}</div></div><div><b>${esc(i.empresa||'-')}</b><div class="muted">${esc(i.unidade||'-')} • ${esc(i.setor||'-')}</div></div><div><b>${esc(i.sistema||'-')}</b><div class="muted">${esc(i.navegador||'-')}</div></div><div class="tag ${esc(i.status||'offline')}">${statusTexto(i.status)}</div></article>`).join(''):'<div class="box vazio">Nenhum dispositivo encontrado.</div>'}function conectar(){ws=new WebSocket(CONFIG.WS_URL);ws.onopen=()=>{status.textContent='Tempo real conectado';ws.send(JSON.stringify({type:'dashboard-register',secret:CONFIG.SECRET}));pedirLista()};ws.onmessage=e=>{let m={};try{m=JSON.parse(e.data)}catch{}if(m.type==='devices-list'){devices=Array.isArray(m.devices)?m.devices:[];render()}};ws.onclose=()=>{status.textContent='Desconectado';setTimeout(conectar,2500)}}function pedirLista(){if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:'devices-list-request',secret:CONFIG.SECRET}))}['busca','empresa','statusFiltro'].forEach(id=>$(id).addEventListener('input',render));conectar();render();
</script>
</body>
</html>
